<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#06101f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Math Planner">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Math Study Planner</title>
    <link rel="manifest" href="manifest.json?v=20260623-1">
    <link rel="icon" href="icon-192.png?v=20260623-1" type="image/png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png?v=20260623-1">
    <link rel="stylesheet" href="styles.css?v=20260623-1">
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow" id="weekEyebrow">Semaine A</p>
          <h1 id="viewTitle">Calendrier</h1>
        </div>
      </header>

      <main class="app-main">
        <section id="calendarView" class="view active-view" aria-labelledby="viewTitle">
          <div id="weekSummary" class="week-summary"></div>
          <div id="calendarNowNext" class="calendar-now-next"></div>
          <div id="weekCalendar" class="week-calendar"></div>
          <div id="courseDetail" class="course-detail"></div>
        </section>

        <section id="progressView" class="view" aria-labelledby="viewTitle">
          <div id="progressContent" class="progress-content"></div>
          <details class="danger-zone">
            <summary>Options avancees</summary>
            <button id="resetProgress" class="danger-button" type="button">Remettre a zero</button>
          </details>
        </section>

        <section id="programmingView" class="view" aria-labelledby="viewTitle">
          <div id="programmingContent" class="programming-content"></div>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="Navigation principale">
        <button class="nav-button active" type="button" data-view="calendar">
          <span class="nav-icon nav-icon-calendar" aria-hidden="true"></span>
          <strong>Calendrier</strong>
        </button>
        <button class="nav-button" type="button" data-view="progress">
          <span class="nav-icon nav-icon-progress" aria-hidden="true"></span>
          <strong>Progres</strong>
        </button>
        <button class="nav-button" type="button" data-view="programming">
          <span class="nav-icon nav-icon-programming" aria-hidden="true"></span>
          <strong>Programme</strong>
        </button>
      </nav>
    </div>

    <script src="data.js?v=20260623-1"></script>
    <script src="app.js?v=20260623-1"></script>
  </body>
</html>

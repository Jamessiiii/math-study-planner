<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#2f7d5c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Math Planner">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Math Study Planner</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow" id="weekEyebrow">Semaine A</p>
          <h1 id="viewTitle">Calendrier</h1>
        </div>
      </header>

      <main class="app-main">
        <section id="calendarView" class="view active-view" aria-labelledby="viewTitle">
          <div id="weekSummary" class="week-summary"></div>
          <div id="weekCalendar" class="week-calendar"></div>
          <div id="courseDetail" class="course-detail"></div>
        </section>

        <section id="progressView" class="view" aria-labelledby="viewTitle">
          <div id="progressContent" class="progress-content"></div>
          <button id="resetProgress" class="danger-button" type="button">Remettre a zero</button>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="Navigation principale">
        <button class="nav-button active" type="button" data-view="calendar">
          <strong>Calendrier</strong>
        </button>
        <button class="nav-button" type="button" data-view="progress">
          <strong>Progres</strong>
        </button>
      </nav>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
